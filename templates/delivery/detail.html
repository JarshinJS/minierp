{% extends "base.html" %}

{% block title %}Delivery Note {{ delivery.delivery_number }} - Shiv Furniture Works ERP{% endblock %}

{% block content %}
<div x-data="toastManager()" @htmx-response-error.window="showToast($event.detail.xhr.responseText)" class="relative">
    <!-- Toast notifications -->
    <div class="fixed top-4 right-4 z-50 space-y-2 pointer-events-none">
        <template x-for="toast in toasts" :key="toast.id">
            <div x-show="toast.visible"
                 x-transition:enter="transition ease-out duration-300"
                 x-transition:enter-start="opacity-0 translate-y-2 sm:translate-y-0 sm:translate-x-2"
                 x-transition:enter-end="opacity-100 translate-y-0 sm:translate-x-0"
                 x-transition:leave="transition ease-in duration-200"
                 x-transition:leave-start="opacity-100"
                 x-transition:leave-end="opacity-0"
                 class="max-w-sm w-full bg-white shadow-lg rounded-lg border-l-4 border-red-500 p-4 pointer-events-auto flex items-center justify-between shadow-2xl">
                <div class="flex items-center">
                    <svg class="w-5 h-5 text-red-500 mr-2 flex-shrink-0" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 8v4m0 4h.01M21 12a9 9 0 11-18 0 9 9 0 0118 0z"/></svg>
                    <span class="text-sm font-medium text-slate-800" x-text="toast.message"></span>
                </div>
                <button @click="toast.visible = false" class="text-slate-400 hover:text-slate-600 ml-4">
                    <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12"/></svg>
                </button>
            </div>
        </template>
    </div>

    <!-- Back to List -->
    <div class="mb-6">
        <a href="{% url 'delivery:list' %}" class="inline-flex items-center text-sm font-medium text-slate-500 hover:text-slate-700 transition-colors">
            <svg class="w-4 h-4 mr-1" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M10 19l-7-7m0 0l7-7m-7 7h18"/></svg>
            Back to Delivery Logs
        </a>
    </div>

    <!-- Main Detail Card -->
    {% include "delivery/partials/delivery_card.html" %}
</div>

<script>
    function toastManager() {
        return {
            toasts: [],
            showToast(message) {
                const id = Date.now();
                this.toasts.push({
                    id: id,
                    message: message || 'An error occurred.',
                    visible: true
                });
                
                // Auto dismiss after 4 seconds
                setTimeout(() => {
                    const toast = this.toasts.find(t => t.id === id);
                    if (toast) toast.visible = false;
                }, 4000);
            }
        }
    }
</script>
{% endblock %}
